<h2>1. 로그인 / 회원가입</h2>
<p class="subtitle">모바일 기준 와이어프레임입니다. 피드백 주세요.</p>

<div class="split">
  <!-- 로그인 -->
  <div class="mockup">
    <div class="mockup-header">로그인</div>
    <div class="mockup-body" style="padding:24px;">
      <div style="text-align:center;margin-bottom:32px;">
        <div style="font-size:40px;margin-bottom:8px;">🏠</div>
        <div style="font-size:18px;font-weight:700;color:#cdd6f4;">우리집 살림 매니저</div>
      </div>

      <div style="margin-bottom:16px;">
        <div class="label" style="margin-bottom:4px;">이메일</div>
        <input class="mock-input" placeholder="example@email.com" style="width:100%;box-sizing:border-box;">
      </div>

      <div style="margin-bottom:24px;">
        <div class="label" style="margin-bottom:4px;">비밀번호</div>
        <input class="mock-input" placeholder="********" style="width:100%;box-sizing:border-box;">
      </div>

      <button class="mock-button" style="width:100%;padding:12px;font-size:16px;background:#89b4fa;color:#1e1e2e;border:none;border-radius:8px;font-weight:700;">로그인</button>

      <div style="text-align:center;margin-top:16px;color:#a6adc8;font-size:14px;">
        계정이 없으신가요? <span style="color:#89b4fa;text-decoration:underline;cursor:pointer;">회원가입</span>
      </div>
    </div>
  </div>

  <!-- 회원가입 -->
  <div class="mockup">
    <div class="mockup-header">회원가입</div>
    <div class="mockup-body" style="padding:24px;">
      <div style="text-align:center;margin-bottom:32px;">
        <div style="font-size:40px;margin-bottom:8px;">🏠</div>
        <div style="font-size:18px;font-weight:700;color:#cdd6f4;">우리집 살림 매니저</div>
      </div>

      <div style="margin-bottom:16px;">
        <div class="label" style="margin-bottom:4px;">이름</div>
        <input class="mock-input" placeholder="보희" style="width:100%;box-sizing:border-box;">
      </div>

      <div style="margin-bottom:16px;">
        <div class="label" style="margin-bottom:4px;">이메일</div>
        <input class="mock-input" placeholder="example@email.com" style="width:100%;box-sizing:border-box;">
      </div>

      <div style="margin-bottom:16px;">
        <div class="label" style="margin-bottom:4px;">비밀번호</div>
        <input class="mock-input" placeholder="********" style="width:100%;box-sizing:border-box;">
      </div>

      <div style="margin-bottom:24px;">
        <div class="label" style="margin-bottom:4px;">비밀번호 확인</div>
        <input class="mock-input" placeholder="********" style="width:100%;box-sizing:border-box;">
      </div>

      <button class="mock-button" style="width:100%;padding:12px;font-size:16px;background:#89b4fa;color:#1e1e2e;border:none;border-radius:8px;font-weight:700;">회원가입</button>

      <div style="text-align:center;margin-top:16px;color:#a6adc8;font-size:14px;">
        이미 계정이 있으신가요? <span style="color:#89b4fa;text-decoration:underline;cursor:pointer;">로그인</span>
      </div>
    </div>
  </div>
</div>
