<h2>5. 꽝뽑기</h2>
<p class="subtitle">멤버 선택 → 뽑기 → 결과 흐름입니다. 피드백 주세요.</p>

<div class="split">

  <!-- 꽝뽑기 설정 -->
  <div class="mockup" style="max-width:360px;">
    <div class="mockup-header">꽝뽑기 — 설정</div>
    <div class="mockup-body" style="padding:0;">

      <!-- 상단 -->
      <div style="padding:14px 16px;border-bottom:1px solid #313244;">
        <span style="font-size:16px;font-weight:700;color:#cdd6f4;">💣 꽝뽑기</span>
      </div>

      <div style="padding:16px;">

        <!-- 참여 멤버 선택 -->
        <div style="margin-bottom:20px;">
          <div class="label" style="margin-bottom:8px;font-size:11px;">참여 멤버</div>
          <div style="background:#1e1e2e;border-radius:8px;padding:8px;">
            <div style="display:flex;align-items:center;gap:10px;padding:8px;border-bottom:1px solid #313244;">
              <input type="checkbox" checked style="accent-color:#89b4fa;">
              <span style="font-size:14px;color:#cdd6f4;">언니</span>
            </div>
            <div style="display:flex;align-items:center;gap:10px;padding:8px;border-bottom:1px solid #313244;">
              <input type="checkbox" checked style="accent-color:#89b4fa;">
              <span style="font-size:14px;color:#cdd6f4;">보희</span>
            </div>
            <div style="display:flex;align-items:center;gap:10px;padding:8px;">
              <input type="checkbox" checked style="accent-color:#89b4fa;">
              <span style="font-size:14px;color:#cdd6f4;">동생</span>
            </div>
          </div>
        </div>

        <!-- 당첨 인원 수 -->
        <div style="margin-bottom:24px;">
          <div class="label" style="margin-bottom:8px;font-size:11px;">당첨 인원</div>
          <div style="display:flex;align-items:center;gap:16px;justify-content:center;">
            <button style="width:32px;height:32px;background:#313244;color:#cdd6f4;border:none;border-radius:8px;font-size:18px;cursor:pointer;font-weight:700;">−</button>
            <span style="font-size:24px;font-weight:700;color:#cdd6f4;min-width:30px;text-align:center;">1</span>
            <button style="width:32px;height:32px;background:#313244;color:#cdd6f4;border:none;border-radius:8px;font-size:18px;cursor:pointer;font-weight:700;">+</button>
          </div>
          <div style="text-align:center;font-size:11px;color:#a6adc8;margin-top:6px;">3명 중 1명 당첨</div>
        </div>

        <!-- 꽝뽑기 버튼 -->
        <button style="width:100%;padding:14px;background:#f38ba8;color:#1e1e2e;border:none;border-radius:10px;font-weight:700;font-size:16px;cursor:pointer;">💣 꽝뽑기!</button>

      </div>

      <!-- 하단 탭 -->
      <div style="display:flex;justify-content:space-around;align-items:center;padding:10px 0;border-top:1px solid #313244;background:#181825;margin-top:auto;">
        <div style="text-align:center;"><div style="font-size:18px;">🏠</div><div style="font-size:9px;color:#a6adc8;">홈</div></div>
        <div style="text-align:center;"><div style="font-size:18px;">📅</div><div style="font-size:9px;color:#a6adc8;">캘린더</div></div>
        <div style="text-align:center;"><div style="font-size:18px;">💣</div><div style="font-size:9px;color:#89b4fa;font-weight:600;">꽝뽑기</div></div>
        <div style="text-align:center;"><div style="font-size:18px;">📊</div><div style="font-size:9px;color:#a6adc8;">통계</div></div>
        <div style="text-align:center;"><div style="font-size:18px;">⚙️</div><div style="font-size:9px;color:#a6adc8;">설정</div></div>
      </div>
    </div>
  </div>

  <!-- 꽝뽑기 결과 -->
  <div class="mockup" style="max-width:360px;">
    <div class="mockup-header">꽝뽑기 — 결과</div>
    <div class="mockup-body" style="padding:0;">

      <!-- 상단 -->
      <div style="padding:14px 16px;border-bottom:1px solid #313244;">
        <span style="font-size:16px;font-weight:700;color:#cdd6f4;">💣 꽝뽑기</span>
      </div>

      <div style="padding:24px 16px;text-align:center;">

        <!-- 결과 표시 -->
        <div style="margin-bottom:32px;">
          <div style="font-size:14px;color:#a6adc8;margin-bottom:16px;">당첨자 발표!</div>

          <div style="display:flex;justify-content:center;gap:24px;margin-bottom:24px;">
            <!-- 꽝 -->
            <div style="text-align:center;">
              <div style="width:64px;height:64px;border-radius:50%;background:rgba(88,91,112,0.2);border:2px solid #585b70;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;">
                <span style="font-size:28px;">😌</span>
              </div>
              <div style="font-size:13px;color:#585b70;">언니</div>
              <div style="font-size:11px;color:#585b70;">꽝</div>
            </div>

            <!-- 당첨 -->
            <div style="text-align:center;">
              <div style="width:64px;height:64px;border-radius:50%;background:rgba(243,139,168,0.15);border:2px solid #f38ba8;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;">
                <span style="font-size:28px;">💣</span>
              </div>
              <div style="font-size:15px;color:#f38ba8;font-weight:700;">보희</div>
              <div style="font-size:12px;color:#f38ba8;font-weight:600;">당첨!</div>
            </div>

            <!-- 꽝 -->
            <div style="text-align:center;">
              <div style="width:64px;height:64px;border-radius:50%;background:rgba(88,91,112,0.2);border:2px solid #585b70;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;">
                <span style="font-size:28px;">😌</span>
              </div>
              <div style="font-size:13px;color:#585b70;">동생</div>
              <div style="font-size:11px;color:#585b70;">꽝</div>
            </div>
          </div>
        </div>

        <!-- 다시하기 / 확인 버튼 -->
        <div style="display:flex;gap:10px;">
          <button style="flex:1;padding:12px;background:transparent;color:#a6adc8;border:1px solid #313244;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;">다시하기</button>
          <button style="flex:2;padding:12px;background:#89b4fa;color:#1e1e2e;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;">확인</button>
        </div>

      </div>

      <!-- 하단 탭 -->
      <div style="display:flex;justify-content:space-around;align-items:center;padding:10px 0;border-top:1px solid #313244;background:#181825;margin-top:auto;">
        <div style="text-align:center;"><div style="font-size:18px;">🏠</div><div style="font-size:9px;color:#a6adc8;">홈</div></div>
        <div style="text-align:center;"><div style="font-size:18px;">📅</div><div style="font-size:9px;color:#a6adc8;">캘린더</div></div>
        <div style="text-align:center;"><div style="font-size:18px;">💣</div><div style="font-size:9px;color:#89b4fa;font-weight:600;">꽝뽑기</div></div>
        <div style="text-align:center;"><div style="font-size:18px;">📊</div><div style="font-size:9px;color:#a6adc8;">통계</div></div>
        <div style="text-align:center;"><div style="font-size:18px;">⚙️</div><div style="font-size:9px;color:#a6adc8;">설정</div></div>
      </div>
    </div>
  </div>

</div>
